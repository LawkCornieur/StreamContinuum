name: Generate Kodi Repo

on:
  push:
    branches:
      - main
    paths:
      - 'plugin.video.streamcontinuum/**'
      - 'repository.streamcontinuum/**'
      - 'generate_repo.js'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    permissions:
      contents: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install dependencies
        run: npm install

      - name: Build Repository and Web
        run: npm run build

      - name: Commit and push changes
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add addons.xml addons.xml.md5 *.zip plugin.video.streamcontinuum/*.zip repository.streamcontinuum/*.zip index.html assets/
          git commit -m "Automated Kodi repo and web update [skip ci]" || echo "No changes to commit"
          git push
