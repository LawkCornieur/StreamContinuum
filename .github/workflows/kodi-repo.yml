name: Generate Kodi Repo

on:
  push:
    branches:
      - main
    paths:
      - 'plugin.video.streamcontinuum/**'
      - 'repository.streamcontinuum/**'
      - 'generate_repo.js'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install

      - name: Generate Repository Files
        run: npx tsx generate_repo.js

      - name: Commit and push changes
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          # Smazat staré zipy před přidáním nových, pokud chceme udržovat repo čisté
          # git rm -f *.zip plugin.video.streamcontinuum/*.zip repository.streamcontinuum/*.zip || true
          git add addons.xml addons.xml.md5 *.zip plugin.video.streamcontinuum/*.zip repository.streamcontinuum/*.zip
          git commit -m "Automated Kodi repo update [skip ci]" || echo "No changes to commit"
          git push
